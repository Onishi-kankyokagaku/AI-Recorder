<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
    
    let rec, timer;
    let isFirstTime = true;
    let isFinalAction = false;
    const worker = new Worker('worker.js');
    
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const status = document.getElementById('status');

    worker.onmessage = (e) => {
        const data = e.data;
        if (data.status === 'success') {
            if (data.result.url && (data.type === 'start' || data.type === 'final')) {
                if (!document.querySelector('.ss-link')) {
                    status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを開く ↗</a>`;
                }
            }
            if (data.type === 'final') {
                status.innerHTML = "議事録の作成が完了しました。";
            }
        }
    };

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('silent-audio').play();
            isFirstTime = true;
            isFinalAction = false;

            const startSegment = () => {
                let chunks = [];
                rec = new MediaRecorder(stream);
                rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                
                rec.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'audio/webm' }); // 一旦webmで受ける
                    const arrayBuffer = await blob.arrayBuffer();
                    
                    const sendType = isFirstTime ? "start" : (isFinalAction ? "final" : "memo");
                    
                    // Workerに丸投げ（デコードもWorker内でやるのが一番安全です）
                    worker.postMessage({
                        arrayBuffer: arrayBuffer,
                        type: sendType,
                        gasUrl: GAS_URL
                    }, [arrayBuffer]);

                    isFirstTime = false;
                    if (!isFinalAction) startSegment(); // 停止ボタンでないなら次を開始
                };
                rec.start();
            };

            startSegment();

            timer = setInterval(() => {
                if (rec && rec.state === "recording") rec.stop(); // 10分ごとに一度止めて送信
            }, 600000); 

            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerHTML = "録音中...（10分ごとにWorker経由で保存）";
        } catch (err) {
            status.innerText = "エラー: " + err;
        }
    };

    stopBtn.onclick = () => {
        isFinalAction = true;
        clearInterval(timer);
        if (rec && rec.state !== "inactive") {
            rec.stop();
            rec.stream.getTracks().forEach(track => track.stop());
        }
        status.innerHTML = "最終データを送信中...";
        stopBtn.disabled = true;
    };
</script>
