<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・送信</button>
    <p id="status">ステータス: 準備完了</p>
    
    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>
    
    <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
    
    let rec, timer;
    let isFirstTime = true;
    const worker = new Worker('worker.js'); // Workerの起動
    
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const status = document.getElementById('status');

    // Workerからの返信を受け取った時の処理
    worker.onmessage = (e) => {
        const data = e.data;
        if (data.status === 'success') {
            if (data.result.url) {
                status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを確認</a>`;
            }
            console.log("保存完了:", data.result);
        } else {
            console.error("Workerエラー:", data.error);
        }
    };

    startBtn.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('silent-audio').play(); // 不眠設定
            
            rec = new MediaRecorder(stream);
            isFirstTime = true;
            
    rec.ondataavailable = async (e) => {
    if (e.data.size > 0) {
        const arrayBuffer = await e.data.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 音声データをデコード
        audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
            const rawData = buffer.getChannelData(0); // 左チャンネルの生データ
            const sendType = isFirstTime ? "start" : (rec.state === "inactive" ? "final" : "memo");
            
            // Workerへ「生の数値データ」を転送（Transferableを使用しメモリを解放）
            worker.postMessage({
                audioRawData: rawData.buffer, // Bufferとして送る
                sampleRate: buffer.sampleRate,
                type: sendType,
                gasUrl: GAS_URL
            }, [rawData.buffer]); 
            
            isFirstTime = false;
        });
    }
};

            rec.start(); // 録音開始（以後、stopボタンを押すまで止まらない）

            // 10分ごとに「データだけ」を取り出す（録音は継続！）
            timer = setInterval(() => {
                if (rec.state === "recording") {
                    rec.requestData(); // これが「継ぎ目なし」の鍵
                }
            }, 600000); 

            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerHTML = "録音中...（連続録音モード：隙間なく記録しています）";
        } catch (e) {
            status.innerText = "エラー: マイクにアクセスできません。";
        }
    };

    stopBtn.onclick = () => {
        clearInterval(timer);
        if (rec && rec.state !== "inactive") {
            rec.stop(); // ここで初めて録音が完全停止し、最後のデータが送信される
            rec.stream.getTracks().forEach(track => track.stop());
        }
        status.innerHTML = "録音を終了しました。最終データを送信・解析中です...";
        stopBtn.disabled = true;
        startBtn.disabled = false;
    };
        
    async function sendToGAS(blob, type) {
        const reader = new FileReader();
        reader.readAsDataURL(blob); 
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            // URLパラメータにtypeを付与
            const targetUrl = `${GAS_URL}?type=${type}`;
            
            try {
                const response = await fetch(targetUrl, {
                    method: "POST",
                    mode: "cors", // no-corsからcorsに変更
                    body: base64Data,
                    headers: {
                        // ここはあえて空にするか、Content-Typeを指定しないのがGAS連携のコツです
                    }
                });
    
                if (response.ok) {
                    const data = await response.json();
                    console.log("GASからのレスポンス:", data);
                    
                    if (data.url) {
                        // ステータス欄にリンクを表示
                        status.innerHTML += `<br><a href="${data.url}" target="_blank" style="display:inline-block; margin-top:10px; padding:10px; background:#4285f4; color:white; text-decoration:none; border-radius:5px;">スプレッドシートを開く</a>`;
                    }
                }
            } catch (e) {
                // CORSエラーが出る場合は、GAS側の公開設定が「全員（匿名含む）」になっているか再確認
                console.error("URL取得に失敗しました。CORSエラーの可能性があります:", e);
            }
        };
    }
    </script>
</body>
</html>
