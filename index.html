<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・送信</button>
    <p id="status">ステータス: 準備完了</p>

    <script>
        // ★ここに自分のGASのURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";

        let rec, chunks = [];
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s);
                chunks = [];
                rec.ondataavailable = e => chunks.push(e.data);
                rec.start();
                
                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerText = "録音中... (マイクは正常です)";
            } catch (e) {
                status.innerText = "エラー: マイクにアクセスできませんでした。";
            }
        };

        stopBtn.onclick = () => {
            status.innerText = "送信中... しばらくお待ちください。";
            stopBtn.disabled = true;
            rec.stop();
            rec.onstop = async () => {
                const blob = new Blob(chunks, { type: "audio/mpeg" });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    try {
                        await fetch(GAS_URL, {
                            method: "POST",
                            body: base64Data,
                            mode: "no-cors" // Googleのセキュリティ制限を回避
                        });
                        status.innerText = "送信完了！スプレッドシートを確認してください。";
                    } catch (e) {
                        status.innerText = "送信エラーが発生しました。";
                    }
                    startBtn.disabled = false;
                };
            };
        };
    </script>
</body>
</html>
