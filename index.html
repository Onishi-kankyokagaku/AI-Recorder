<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI議事録レコーダー（Worker/10分区切り版）</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; line-height: 1.6; }
        .ss-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

<script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
        
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');

        // 画面にログを表示する関数
        function log(msg) {
            console.log(msg);
            status.innerHTML += `<br><span style="color:blue;font-size:0.8rem;">[Log] ${msg}</span>`;
        }

        let currentSsId = null; 
        let rec, timer, audioCtx;
        let isFirstTime = true;
        let isFinalAction = false;
        
        log("プログラム読み込み完了");

        let worker;
        try {
            worker = new Worker('worker.js');
            log("Worker起動成功");
        } catch(e) {
            log("Worker起動失敗: " + e.message);
        }

worker.onmessage = (e) => {
            const data = e.data;
            // GASからの生の結果を表示
            if (data.status === 'success') {
                log(`GAS成功: Type=${data.type} / Msg=${data.result.message}`);
                
                if (data.result.ssId) {
                    currentSsId = data.result.ssId;
                }
                if (data.result.url && (data.type === 'start' || data.type === 'final')) {
                    if (!document.querySelector('.ss-link')) {
                        status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを開く ↗</a>`;
                    }
                }
                if (data.type === 'final') {
                    log("議事録作成プロセス完了（GAS側の応答を確認してください）");
                    status.innerHTML = "<strong>すべての処理が完了しました。</strong>";
                    currentSsId = null; 
                }
            } else {
                log(`GASエラー [${data.type}]: ${data.error}`);
            }
        };

        const startSegment = async (stream) => {
            let chunks = [];
            rec = new MediaRecorder(stream);
            rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            rec.onstop = async () => {
                const sendType = isFirstTime ? "start" : (isFinalAction ? "final" : "memo");
                log(`データ処理中... 送信タイプ: ${sendType}`); // ここでタイプを確認！
                
                if (chunks.length === 0) { log("データが空です"); return; }
                
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                    log(`${sendType} データをWorkerへ送信中...`);
                    const floatArray = buffer.getChannelData(0);
                    
                    worker.postMessage({
                        floatArray: floatArray,
                        sampleRate: buffer.sampleRate,
                        type: sendType,
                        gasUrl: GAS_URL,
                        ssId: currentSsId
                    }, [floatArray.buffer]);
                    
                    isFirstTime = false;
                    if (!isFinalAction) startSegment(stream);
                }, (err) => log("音声デコードエラー: " + err));
            };
            rec.start();
        };

        startBtn.onclick = async () => {
            log("録音ボタンが押されました");
            try {
                log("マイク権限をリクエスト中...");
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("マイク許可されました");

                document.getElementById('silent-audio').play();
                
                isFirstTime = true;
                isFinalAction = false;
                startSegment(stream);

                timer = setInterval(() => {
                    if (rec && rec.state === "recording") {
                        log("10分経過、自動区切り実行");
                        rec.stop();
                    }
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...";
            } catch (err) {
                log("開始エラー: " + err.name + ": " + err.message);
            }
        };

        stopBtn.onclick = () => {
            log("停止ボタンが押されました");
            isFinalAction = true;
            clearInterval(timer);
            if (rec && rec.state !== "inactive") {
                rec.stop();
                rec.stream.getTracks().forEach(track => track.stop());
            }
            status.innerHTML = "最終データを送信中...";
            stopBtn.disabled = true;
        };
    </script>
</body>
</html>
