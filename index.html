<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 30px; background: #f4f7f6; position: relative; }
        /* 右上にバージョンを表示するスタイル */
        #version-tag { position: absolute; top: 10px; right: 10px; font-size: 0.7rem; color: #999; }
        
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; line-height: 1.6; }
        .ss-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="version-tag">Ver. 1.0.0</div>

    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        // --- 1. 設定・宣言エリア ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
        
        let currentSsId = null; 
        let rec = null, timer = null, audioCtx = null;
        let isFirstTime = true, isFinalAction = false;
        let worker = null;

        const status = document.getElementById('status');
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');

        function log(msg) {
            console.log(msg);
            status.innerHTML += `<br><span style="color:blue;font-size:0.8rem;">[Log] ${msg}</span>`;
        }

        // --- 2. Worker初期化 ---
        try {
            worker = new Worker('worker.js');
            log("Worker準備完了");
        } catch(e) {
            log("Workerエラー: " + e.message);
        }

        worker.onmessage = (e) => {
            const data = e.data;
            if (data.status === 'success') {
                log(`GAS成功: ${data.type} / ${data.result.message}`);
                if (data.result.ssId) currentSsId = data.result.ssId;
                
                if (data.result.url && (data.type === 'start' || data.type === 'final')) {
                    if (!document.querySelector('.ss-link')) {
                        status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを開く ↗</a>`;
                    }
                }
                if (data.type === 'final') {
                    status.innerHTML = "<strong>議事録の作成が完了しました。</strong>";
                    currentSsId = null; 
                }
            } else {
                log(`エラー [${data.type}]: ${data.error}`);
            }
        };

        // --- 3. 録音コアロジック ---
        const startSegment = async (stream) => {
            let chunks = [];
            rec = new MediaRecorder(stream);
            rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            rec.onstop = async () => {
                let sendType = isFinalAction ? "final" : (isFirstTime ? "start" : "memo");
                log(`送信判定: ${sendType}`);

                if (chunks.length === 0) return;
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                    log(`${sendType} 送信中...`);
                    const floatArray = buffer.getChannelData(0);
                    worker.postMessage({
                        floatArray: floatArray,
                        sampleRate: buffer.sampleRate,
                        type: sendType,
                        gasUrl: GAS_URL,
                        ssId: currentSsId
                    }, [floatArray.buffer]);
                    
                    isFirstTime = false;
                    if (!isFinalAction) startSegment(stream);
                });
            };
            rec.start();
        };

        // --- 4. 操作イベント ---
        startBtn.onclick = async () => {
            log("● 録音開始リクエスト");
            try {
                isFirstTime = true;
                isFinalAction = false;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("マイク許可OK");

                document.getElementById('silent-audio').play();
                startSegment(stream);

                timer = setInterval(() => {
                    if (rec && rec.state === "recording") rec.stop();
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...";
            } catch (err) {
                log("開始エラー: " + err.message);
            }
        };

        stopBtn.onclick = () => {
            log("■ 停止・解析リクエスト");
            isFinalAction = true;
            clearInterval(timer);
            if (rec && rec.state !== "inactive") {
                rec.stop();
                rec.stream.getTracks().forEach(track => track.stop());
            }
            status.innerHTML = "最終データを送信中...";
            stopBtn.disabled = true;
        };
    </script>
</body>
</html>
