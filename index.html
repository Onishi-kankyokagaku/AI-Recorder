<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AI議事録レコーダー</title>
<style>

    /* 録音中のボタン：深みのある光と鼓動 */
    .recording-active {
        background: linear-gradient(135.2deg, #4CAF50 1.2%, #81C784 98.8%) !important;
        position: relative;
        border: none;
        outline: none;
        /* 2種類の影を重ねてネオン感を出す */
        box-shadow: 0 0 15px rgba(76, 175, 80, 0.6), 0 0 30px rgba(76, 175, 80, 0.4);
        animation: living-pulse 2.5s infinite ease-in-out;
    }

    /* 鼓動するように広がる波紋 */
    @keyframes living-pulse {
        0% {
            transform: scale(1);
            filter: brightness(1);
            box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
        }
        40% {
            transform: scale(1.03); /* ぐっと前に出る感じ */
            filter: brightness(1.2); /* 少し明るく */
            box-shadow: 0 0 0 25px rgba(76, 175, 80, 0); /* 大きく広がる波紋 */
        }
        100% {
            transform: scale(1);
            filter: brightness(1);
            box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
        }
    }
    
    /* ついでに停止ボタンも録音中は「停止待ち」らしく少し光らせるとカッコいいです */
    #stop:not(:disabled) {
        animation: stop-alert 2s infinite;
    }
    
    @keyframes stop-alert {
        0% { opacity: 1; }
        50% { opacity: 0.8; }
        100% { opacity: 1; }
    }
    
    body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            background: #f4f7f6; 
            margin: 0 auto;       /* ★追加：左右の余白を自動にして中央へ */
            max-width: 500px;     /* ★追加：画面の最大幅を500px（スマホの横幅くらい）に制限 */
        }
        
        #version-tag { 
            text-align: right;    /* 右寄せにする */
            font-size: 0.7rem; 
            color: #999;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block; /* 幅を文字分だけにする */
        }
        
        /* バージョンを囲む親要素（右に寄せるため） */
        .ver-container {
            text-align: right;
            margin-bottom: 10px;
        }
        
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 30px; }

        /* ボタンの基本設定 */
        button { 
            font-size: 1.2rem; 
            padding: 20px; 
            margin: 10px 0; /* 上下に余白 */
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s;
            width: 100%; /* 基本は幅いっぱい */
            max-width: 400px; /* パソコンでは広がりすぎないように */
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #start { background: #4CAF50; color: white; font-weight: bold; }
        #stop { background: #f44336; color: white; font-weight: bold; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #status { 
            margin-top: 30px; 
            color: #555; 
            font-size: 0.9rem;
            line-height: 1.6; 
            word-wrap: break-word; /* 長いURLも折り返す */
            text-align: left; /* ログは見やすく左寄せ */
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;

            max-width: 400px;     /* ボタンの最大幅に合わせる */
            margin-left: auto;    /* 中央寄せ */
            margin-right: auto;   /* 中央寄せ */
        }

        .ss-link { 
            display: block; 
            margin-top: 15px; 
            padding: 15px; 
            background: #4285f4; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <div class="ver-container">
        <span id="version-tag">Ver. 1.1.7</span>
    </div>

    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
    
    let currentSsId = null; 
    let currentSsUrl = null; 
    let currentLogRow = null; 
    let rec = null, timer = null, audioCtx = null;
    let isFinalAction = false;
    let worker = null;
    let sendCount = 0; 
    let wakeLock = null;
    let pollTimer = null; // ★追加：ポーリング用タイマー

    const status = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const silentAudio = document.getElementById('silent-audio');

    startBtn.disabled = true;
    status.innerHTML = "システム初期化中（スプレッドシート作成中）...";

    function log(msg) {
        console.log(msg);
        status.innerHTML += `<br><span style="color:blue;font-size:0.8rem;">[Log] ${msg}</span>`;
    }

    // --- ポーリング開始関数 ---
    const startPolling = (logRow) => {
        log("議事録の完成を待機しています...");
        pollTimer = setInterval(() => {
            worker.postMessage({
                type: 'check_status',
                gasUrl: GAS_URL,
                logRow: logRow
            });
        }, 10000); // 10秒おきに確認
    };

    // --- Workerの設定 ---
    worker = new Worker('worker.js');

    worker.onmessage = (e) => {
        const data = e.data;
        if (data.status === 'success') {
            if (data.type === 'init') {
                currentSsId = data.result.ssId;
                currentSsUrl = data.result.url; 
                currentLogRow = data.result.logRow;
                startBtn.disabled = false;
                status.innerHTML = "準備完了";
                log("スプレッドシートを確保しました");
                return;
            }

            // ★追加：ポーリングの結果受信
            if (data.type === 'check_status') {
                if (data.result.isCompleted) {
                    clearInterval(pollTimer);
                    finishUI(data.result.url);
                } else {
                    log(`現在ステータス: ${data.result.currentStatus || "解析中"}`);
                }
                return;
            }

            // ★追加：最終データが受理されたら、GASに「作成開始」を命じてポーリングを始める
            if (data.type === 'final') {
                log("最終データ送信完了。議事録作成をリクエストします...");
                worker.postMessage({
                    type: 'finalize_request',
                    gasUrl: GAS_URL,
                    ssId: currentSsId,
                    logRow: currentLogRow
                });
                startPolling(currentLogRow);
                return;
            }

            if (data.type !== 'recording' && data.type !== 'finalize_request') {
                log(`No.${data.index} 転記完了`);
            }
        } else {
            log(`エラー: ${data.error}`);
        }
    };

    // 完了時のUI更新
    function finishUI(url) {
        status.innerHTML = `<h3>✨ 議事録が完成しました</h3>`;
        status.innerHTML += `<a href="${url}" target="_blank" class="ss-link">議事録を確認する ↗</a>`;
        status.innerHTML += `<p style="margin-top: 15px; font-size: 0.9rem; color: #666;">※議事録上部のボタンからダウンロード可能です。</p>`;                
        log("全工程が完了しました。");

        silentAudio.pause();
        silentAudio.currentTime = 0;
        if (wakeLock !== null) {
            wakeLock.release().then(() => { wakeLock = null; });
        }
        window.onbeforeunload = null;
    }

    // --- 以下、既存の録音ロジック（基本そのまま） ---
    const requestWakeLock = async () => {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                log("画面スリープ防止：有効");
            }
        } catch (err) {
            log(`WakeLockエラー: ${err.message}`);
        }
    };

    window.onload = () => {
        worker.postMessage({ type: 'init', gasUrl: GAS_URL });
    };

    const startSegment = async (stream) => {
        let chunks = [];
        rec = new MediaRecorder(stream);
        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        
        rec.onstop = async () => {
            sendCount++; 
            let currentIndex = sendCount; 
            let sendType = isFinalAction ? "final" : "memo"; 

            if (chunks.length === 0) return;
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const arrayBuffer = await blob.arrayBuffer();
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                log(`No.${currentIndex} 送信開始...`);
                const floatArray = buffer.getChannelData(0);
                worker.postMessage({
                    floatArray: floatArray,
                    sampleRate: buffer.sampleRate,
                    type: sendType,
                    index: currentIndex,
                    gasUrl: GAS_URL,
                    ssId: currentSsId,
                    logRow: currentLogRow
                }, [floatArray.buffer]);
                
                if (!isFinalAction) startSegment(stream);
            });
        };
        rec.start();
    };

    startBtn.onclick = async () => {
        startBtn.classList.add('recording-active');
        startBtn.innerText = "● 録音中..."; 
        await requestWakeLock();

        window.onbeforeunload = (e) => {
            e.preventDefault();
            return "録音中にページを離れるとデータが失われます。";
        };

        if (currentLogRow) {
            worker.postMessage({ type: 'recording', gasUrl: GAS_URL, logRow: currentLogRow });
        }
        try {
            isFinalAction = false;
            sendCount = 0; 
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            silentAudio.play();
            startSegment(stream);

            timer = setInterval(() => {
                if (rec && rec.state === "recording") rec.stop();
            }, 300000); 

            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerHTML = "録音中...";
        } catch (err) {
            log("開始エラー: " + err.message);
        }
    };

    stopBtn.onclick = async () => {
        isFinalAction = true;
        startBtn.classList.remove('recording-active');
        startBtn.innerText = "● 録音開始";
        clearInterval(timer);
        if (rec && rec.state !== "inactive") {
            rec.stop();
            rec.stream.getTracks().forEach(track => track.stop());
        }
        status.innerHTML = "最終セグメントを送信中...<br>（完了後に自動で議事録作成を開始します）";
        stopBtn.disabled = true;
    };

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });
</script>
</body>
</html>
