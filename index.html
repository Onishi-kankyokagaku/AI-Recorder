<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・送信</button>
    <p id="status">ステータス: 準備完了</p>
    
    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>
    
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";

        let rec, chunks = [], timer; 
        let isFirstTime = true;
        let isFinalAction = false; // ★追加：停止ボタンが押されたか

        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('silent-audio').play(); // 不眠
                
                isFirstTime = true;
                isFinalAction = false;

                const createRecorder = () => {
                    rec = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    chunks = [];
                    rec.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    
                    rec.onstop = async () => {
                        if (chunks.length === 0) return;
                        const blob = new Blob(chunks, { type: 'audio/webm' });
                        const sendType = isFirstTime ? "start" : (isFinalAction ? "final" : "memo");
                        
                        sendToGAS(blob, sendType);
                        isFirstTime = false;
                    };
                    rec.start();
                };

                createRecorder();

                // 10分（テスト時は 60000 = 1分にする）
                timer = setInterval(() => {
                    if (rec && rec.state === "recording") {
                        rec.stop();
                        createRecorder();
                    }
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...<br>（10分ごとに自動保存、最後に議事録作成）";
            } catch (e) {
                status.innerText = "エラー: マイクにアクセスできません。";
            }
        };

        stopBtn.onclick = () => {
            isFinalAction = true;
            clearInterval(timer);
            if (rec && rec.state !== "inactive") {
                rec.stop();
                rec.stream.getTracks().forEach(track => track.stop());
            }
            status.innerHTML = "最終データを送信しました。<br>スプレッドシートの作成まで暫くお待ちください。"; 
            stopBtn.disabled = true;
            startBtn.disabled = false;
        };
        
        async function sendToGAS(blob, type) {
            const reader = new FileReader();
            reader.readAsDataURL(blob); 
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                const targetUrl = `${GAS_URL}?type=${type}`;
                try {
                    const response = await fetch(targetUrl, {
                        method: "POST",
                        body: base64Data
                    });
                    if (response.ok) {
                        const data = await response.json();
                        if (data.url && type === "start") {
                            status.innerHTML += `<br><a href="${data.url}" target="_blank" style="display:inline-block; margin-top:10px; padding:10px; background:#4285f4; color:white; text-decoration:none; border-radius:5px;">スプレッドシートを開く</a>`;
                        }
                    }
                } catch (e) {
                    console.error("送信エラー:", e);
                }
            };
        }
    </script>
</body>
</html>
