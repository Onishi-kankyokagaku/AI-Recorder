<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・送信</button>
    <p id="status">ステータス: 準備完了</p>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";

        let rec, chunks = [];
        let timer; 
        let isFirstTime = true; // ★初回判定用
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        startBtn.onclick = async () => {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                rec = new MediaRecorder(s);
                chunks = [];
                isFirstTime = true; // 録音開始時にリセット
                
                rec.ondataavailable = e => chunks.push(e.data);
                
                rec.onstop = async () => {
                    if (chunks.length > 0) {
                        const blob = new Blob(chunks, { type: "audio/mpeg" });
                        
                        // ★状態を判定して送信
                        let sendType = "memo";
                        if (isFirstTime) {
                            sendType = "start";
                            isFirstTime = false; // 次からは memo になる
                        }
                        // もし録音機が完全に止まっていて（stopボタン経由）、タイマーも止まっていたら final
                        if (rec.state === "inactive" && !timer) {
                            sendType = "final";
                        }

                        sendToGAS(blob, sendType);
                        chunks = []; 
                    }
                };

                rec.start();

                // 10秒ごとに区切って送信
                timer = setInterval(() => {
                    if (rec.state === "recording") {
                        rec.stop(); 
                        rec.start(); 
                    }
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...<br>（10分ごとに自動保存、最後に議事録作成）";
            } catch (e) {
                status.innerText = "エラー: マイクにアクセスできません。";
            }
        };

    stopBtn.onclick = () => {
        isFinal = true; 
        clearInterval(timer);
        timer = null; 
        
        if (rec && rec.state !== "inactive") {
            rec.stop();
            const stream = rec.stream;
            const tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
        }
    
        // ★修正ポイント：ボタン表示を消し、テキストのみにする
        status.innerHTML = "最終データを送信しました。<br>スプレッドシートの作成まで暫くお待ちください。"; 
        
        stopBtn.disabled = true;
        startBtn.disabled = false;
    };
        
    async function sendToGAS(blob, type) {
        const reader = new FileReader();
        reader.readAsDataURL(blob); 
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            // URLパラメータにtypeを付与
            const targetUrl = `${GAS_URL}?type=${type}`;
            
            try {
                const response = await fetch(targetUrl, {
                    method: "POST",
                    mode: "cors", // no-corsからcorsに変更
                    body: base64Data,
                    headers: {
                        // ここはあえて空にするか、Content-Typeを指定しないのがGAS連携のコツです
                    }
                });
    
                if (response.ok) {
                    const data = await response.json();
                    console.log("GASからのレスポンス:", data);
                    
                    if (data.url) {
                        // ステータス欄にリンクを表示
                        status.innerHTML += `<br><a href="${data.url}" target="_blank" style="display:inline-block; margin-top:10px; padding:10px; background:#4285f4; color:white; text-decoration:none; border-radius:5px;">スプレッドシートを開く</a>`;
                    }
                }
            } catch (e) {
                // CORSエラーが出る場合は、GAS側の公開設定が「全員（匿名含む）」になっているか再確認
                console.error("URL取得に失敗しました。CORSエラーの可能性があります:", e);
            }
        };
    }
    </script>
</body>
</html>
