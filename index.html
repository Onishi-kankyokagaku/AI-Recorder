<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI議事録レコーダー（Worker版）</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; line-height: 1.6; }
        .ss-link { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
        
        let rec, timer, audioCtx;
        let isFirstTime = true;
        let isFinalAction = false; // ★追加：停止ボタンが押されたかのフラグ
        const worker = new Worker('worker.js');
        
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');
        const status = document.getElementById('status');

        worker.onmessage = (e) => {
            const data = e.data;
            if (data.status === 'success') {
                if (data.result.url && (data.type === 'start' || data.type === 'final')) {
                    // スプレッドシートのリンクを重複させないためにチェック
                    if (!document.querySelector('.ss-link')) {
                        status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを開く ↗</a>`;
                    }
                }
                if (data.type === 'final') {
                    status.innerHTML = "議事録の作成が完了しました。スプレッドシートを確認してください。";
                }
                console.log("処理成功:", data.result);
            } else {
                status.innerHTML += `<br><span style="color:red;">エラー: ${data.error}</span>`;
            }
        };

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('silent-audio').play();
                
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                rec = new MediaRecorder(stream);
                isFirstTime = true;
                isFinalAction = false;

                rec.ondataavailable = async (e) => {
                    if (e.data.size > 0) {
                        const arrayBuffer = await e.data.arrayBuffer();
                        audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                            const floatArray = buffer.getChannelData(0);
                            
                            // ★ここが重要：isFinalActionとrec.stateを組み合わせて正確に判定
                            let sendType = "memo";
                            if (isFirstTime) {
                                sendType = "start";
                                isFirstTime = false;
                            } else if (isFinalAction && rec.state === "inactive") {
                                sendType = "final";
                            }
                            
                            worker.postMessage({
                                floatArray: floatArray,
                                sampleRate: buffer.sampleRate,
                                type: sendType,
                                gasUrl: GAS_URL
                            }, [floatArray.buffer]);
                        });
                    }
                };

                rec.start();
                timer = setInterval(() => {
                    if (rec.state === "recording") rec.requestData();
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...<br>（隙間なく連続録音しています。10分ごとに自動保存）";
            } catch (err) {
                status.innerText = "エラー: マイクにアクセスできません。" + err;
            }
        };

        stopBtn.onclick = () => {
            isFinalAction = true; // ★まずフラグを立てる
            clearInterval(timer);
            if (rec && rec.state !== "inactive") {
                rec.stop(); // 停止させるとondataavailableが最後の一回呼ばれる
                rec.stream.getTracks().forEach(track => track.stop());
            }
            status.innerHTML = "最終データを送信中...<br>議事録の生成が終わるまでお待ちください。";
            stopBtn.disabled = true;
            startBtn.disabled = false;
        };
    </script>
</body>
</html>
