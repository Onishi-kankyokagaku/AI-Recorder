<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>AI議事録レコーダー</title>
<style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            background: #f4f7f6; 
            margin: 0 auto;       /* ★追加：左右の余白を自動にして中央へ */
            max-width: 500px;     /* ★追加：画面の最大幅を500px（スマホの横幅くらい）に制限 */
        }
        
        #version-tag { 
            text-align: right;    /* 右寄せにする */
            font-size: 0.7rem; 
            color: #999;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block; /* 幅を文字分だけにする */
        }
        
        /* バージョンを囲む親要素（右に寄せるため） */
        .ver-container {
            text-align: right;
            margin-bottom: 10px;
        }
        
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 30px; }

        /* ボタンの基本設定 */
        button { 
            font-size: 1.2rem; 
            padding: 20px; 
            margin: 10px 0; /* 上下に余白 */
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s;
            width: 100%; /* 基本は幅いっぱい */
            max-width: 400px; /* パソコンでは広がりすぎないように */
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #start { background: #4CAF50; color: white; font-weight: bold; }
        #stop { background: #f44336; color: white; font-weight: bold; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #status { 
            margin-top: 30px; 
            color: #555; 
            font-size: 0.9rem;
            line-height: 1.6; 
            word-wrap: break-word; /* 長いURLも折り返す */
            text-align: left; /* ログは見やすく左寄せ */
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;

            max-width: 400px;     /* ボタンの最大幅に合わせる */
            margin-left: auto;    /* 中央寄せ */
            margin-right: auto;   /* 中央寄せ */
        }

        .ss-link { 
            display: block; 
            margin-top: 15px; 
            padding: 15px; 
            background: #4285f4; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <div class="ver-container">
        <span id="version-tag">Ver. 1.1.0</span>
    </div>

    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
    
    let currentSsId = null; 
    let currentSsUrl = null; // SSのURL保存用
    let rec = null, timer = null, audioCtx = null;
    let isFinalAction = false;
    let worker = null;
    let sendCount = 0; 

    const status = document.getElementById('status');
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');

    startBtn.disabled = true;
    status.innerHTML = "システム初期化中（スプレッドシート作成中）...";

    function log(msg) {
        console.log(msg);
        status.innerHTML += `<br><span style="color:blue;font-size:0.8rem;">[Log] ${msg}</span>`;
    }

    // 1. Worker初期化
    worker = new Worker('worker.js');

    // --- ここで返信を一括管理します ---
    worker.onmessage = (e) => {
        const data = e.data;
        if (data.status === 'success') {
            // 初期化成功時
            if (data.type === 'init') {
                currentSsId = data.result.ssId;
                currentSsUrl = data.result.url; 
                startBtn.disabled = false;
                status.innerHTML = "準備完了";
                log("スプレッドシートを確保しました");
                return;
            }

            // FINAL（終了）処理成功時：ここでリンクを出す
            if (data.type === 'final') {
                status.innerHTML = `<h3>✨ 議事録が完成しました</h3>`;
                status.innerHTML += `<a href="${currentSsUrl}" target="_blank" class="ss-link">議事録を確認する ↗</a>`;
                log("全工程が完了しました。");
            } else {
                log(`No.${data.index} 転記完了`);
            }
        } else {
            log(`エラー: ${data.error}`);
        }
    };

    // --- 起動時処理 ---
    window.onload = () => {
        log("SS発行リクエスト送信...");
        worker.postMessage({
            type: 'init',
            gasUrl: GAS_URL
        });
    };

    const startSegment = async (stream) => {
        let chunks = [];
        rec = new MediaRecorder(stream);
        rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        
        rec.onstop = async () => {
            sendCount++; 
            let currentIndex = sendCount; 
            let sendType = isFinalAction ? "final" : "memo"; 

            if (chunks.length === 0) return;
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const arrayBuffer = await blob.arrayBuffer();
            
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                log(`No.${currentIndex} 送信開始...`);
                const floatArray = buffer.getChannelData(0);
                worker.postMessage({
                    floatArray: floatArray,
                    sampleRate: buffer.sampleRate,
                    type: sendType,
                    index: currentIndex,
                    gasUrl: GAS_URL,
                    ssId: currentSsId
                }, [floatArray.buffer]);
                
                if (!isFinalAction) startSegment(stream);
            });
        };
        rec.start();
    };

    startBtn.onclick = async () => {
        try {
            isFinalAction = false;
            sendCount = 0; // カウントをリセット
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('silent-audio').play();
            startSegment(stream);

            timer = setInterval(() => {
                if (rec && rec.state === "recording") rec.stop();
            }, 600000); // 10分ごとに区切る設定 

            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerHTML = "録音中...";
        } catch (err) {
            log("開始エラー: " + err.message);
        }
    };

    stopBtn.onclick = () => {
        isFinalAction = true;
        clearInterval(timer);
        if (rec && rec.state !== "inactive") {
            rec.stop();
            rec.stream.getTracks().forEach(track => track.stop());
        }
        status.innerHTML = "最終データを解析中...<br>（議事録作成まで1分ほどかかる場合があります）";
        stopBtn.disabled = true;
    };
</script>
</body>
</html>
