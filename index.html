<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI議事録レコーダー</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        button { font-size: 1.2rem; padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        #start { background: #4CAF50; color: white; }
        #stop { background: #f44336; color: white; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; color: #555; font-weight: bold; }
    </style>
</head>
<body>
    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・送信</button>
    <p id="status">ステータス: 準備完了</p>

    <script>
        // ★ここに自分のGASのURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";

    let rec, chunks = [];
    let timer; 
    const startBtn = document.getElementById('start');
    const stopBtn = document.getElementById('stop');
    const status = document.getElementById('status');

    startBtn.onclick = async () => {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ audio: true });
            rec = new MediaRecorder(s);
            chunks = [];
            
            rec.ondataavailable = e => chunks.push(e.data);
            
            // 録音停止時（自動分割時も含む）にGASへ送信
            rec.onstop = async () => {
                if (chunks.length > 0) {
                    const blob = new Blob(chunks, { type: "audio/mpeg" });
                    sendToGAS(blob);
                    chunks = []; 
                }
            };

            rec.start();

            // ★テスト用：10秒（10000ms）ごとに自動で区切る
            timer = setInterval(() => {
                if (rec.state === "recording") {
                    rec.stop(); // 停止させるとonstopが走り送信される
                    rec.start(); // すぐに次の10秒の録音を開始
                }
            }, 10000); 

            startBtn.disabled = true;
            stopBtn.disabled = false;
            status.innerHTML = "録音中...<br>（10秒ごとに自動でGASへ送信します）";
        } catch (e) {
            status.innerText = "エラー: マイクにアクセスできません。";
        }
    };

    stopBtn.onclick = () => {
        clearInterval(timer); // タイマー停止
        if (rec && rec.state !== "inactive") {
            rec.stop();
        }
        status.innerHTML = "最終データを送信中...<br><a href='https://docs.google.com/spreadsheets/u/0/' target='_blank'>スプレッドシートを確認</a>";
        stopBtn.disabled = true;
        startBtn.disabled = false;
    };

    async function sendToGAS(blob) {
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];
            try {
                await fetch(GAS_URL, {
                    method: "POST",
                    body: base64Data,
                    mode: "no-cors"
                });
                console.log("10秒分 送信完了");
            } catch (e) {
                console.error("送信エラー", e);
            }
        };
    }
</script>
