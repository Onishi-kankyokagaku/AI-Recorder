<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI議事録レコーダー</title>
<style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 40px 15px; 
            background: #f4f7f6; 
            margin: 0 auto;       /* ★追加：左右の余白を自動にして中央へ */
            max-width: 400px;     /* ★追加：画面の最大幅を500px（スマホの横幅くらい）に制限 */
        }
        
        #version-tag { 
            position: absolute; 
            top: 10px; 
            right: 15px; 
            font-size: 0.8rem; 
            color: #777;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 30px; }

        /* ボタンの基本設定 */
        button { 
            font-size: 1.2rem; 
            padding: 20px; 
            margin: 10px 0; /* 上下に余白 */
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: 0.3s;
            width: 100%; /* 基本は幅いっぱい */
            max-width: 400px; /* パソコンでは広がりすぎないように */
            display: block;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #start { background: #4CAF50; color: white; font-weight: bold; }
        #stop { background: #f44336; color: white; font-weight: bold; }
        button:active { transform: translateY(2px); box-shadow: none; }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #status { 
            margin-top: 30px; 
            color: #555; 
            font-size: 0.9rem;
            line-height: 1.6; 
            word-wrap: break-word; /* 長いURLも折り返す */
            text-align: left; /* ログは見やすく左寄せ */
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;

            max-width: 400px;     /* ボタンの最大幅に合わせる */
            margin-left: auto;    /* 中央寄せ */
            margin-right: auto;   /* 中央寄せ */
        }

        .ss-link { 
            display: block; 
            margin-top: 15px; 
            padding: 15px; 
            background: #4285f4; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold;
            
        }
    </style>
</head>
<body>
    <div id="version-tag">Ver. 1.0.2</div>

    <h1>AI議事録レコーダー</h1>
    <button id="start">● 録音開始</button>
    <button id="stop" disabled>■ 停止・議事録作成</button>
    <p id="status">ステータス: 準備完了</p>

    <audio id="silent-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script>
        // --- 1. 設定・宣言エリア ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwnThA6GO1XmW9ub9GnIYKNZGl23tPAqheTpRo5MGAtrw3iJpSwv_GKRmQqJmZML65m/exec";
        
        let currentSsId = null; 
        let rec = null, timer = null, audioCtx = null;
        let isFirstTime = true, isFinalAction = false;
        let worker = null;

        const status = document.getElementById('status');
        const startBtn = document.getElementById('start');
        const stopBtn = document.getElementById('stop');

        function log(msg) {
            console.log(msg);
            status.innerHTML += `<br><span style="color:blue;font-size:0.8rem;">[Log] ${msg}</span>`;
        }

        // --- 2. Worker初期化 ---
        try {
            worker = new Worker('worker.js');
            log("Worker準備完了");
        } catch(e) {
            log("Workerエラー: " + e.message);
        }

        worker.onmessage = (e) => {
            const data = e.data;
            if (data.status === 'success') {
                log(`GAS成功: ${data.type} / ${data.result.message}`);
                if (data.result.ssId) currentSsId = data.result.ssId;
                
                if (data.result.url && (data.type === 'start' || data.type === 'final')) {
                    if (!document.querySelector('.ss-link')) {
                        status.innerHTML += `<br><a href="${data.result.url}" target="_blank" class="ss-link">スプレッドシートを開く ↗</a>`;
                    }
                }
                if (data.type === 'final') {
                    status.innerHTML = "<strong>議事録の作成が完了しました。</strong>";
                    currentSsId = null; 
                }
            } else {
                log(`エラー [${data.type}]: ${data.error}`);
            }
        };

        // --- 3. 録音コアロジック ---
        const startSegment = async (stream) => {
            let chunks = [];
            rec = new MediaRecorder(stream);
            rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            
            rec.onstop = async () => {
                let sendType = isFinalAction ? "final" : (isFirstTime ? "start" : "memo");
                log(`送信判定: ${sendType}`);

                if (chunks.length === 0) return;
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioCtx.decodeAudioData(arrayBuffer, (buffer) => {
                    log(`${sendType} 送信中...`);
                    const floatArray = buffer.getChannelData(0);
                    worker.postMessage({
                        floatArray: floatArray,
                        sampleRate: buffer.sampleRate,
                        type: sendType,
                        gasUrl: GAS_URL,
                        ssId: currentSsId
                    }, [floatArray.buffer]);
                    
                    isFirstTime = false;
                    if (!isFinalAction) startSegment(stream);
                });
            };
            rec.start();
        };

        // --- 4. 操作イベント ---
        startBtn.onclick = async () => {
            log("● 録音開始リクエスト");
            try {
                isFirstTime = true;
                isFinalAction = false;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                log("マイク許可OK");

                document.getElementById('silent-audio').play();
                startSegment(stream);

                timer = setInterval(() => {
                    if (rec && rec.state === "recording") rec.stop();
                }, 600000); 

                startBtn.disabled = true;
                stopBtn.disabled = false;
                status.innerHTML = "録音中...";
            } catch (err) {
                log("開始エラー: " + err.message);
            }
        };

        stopBtn.onclick = () => {
            log("■ 停止・解析リクエスト");
            isFinalAction = true;
            clearInterval(timer);
            if (rec && rec.state !== "inactive") {
                rec.stop();
                rec.stream.getTracks().forEach(track => track.stop());
            }
            status.innerHTML = "最終データを送信中...";
            stopBtn.disabled = true;
        };
    </script>
</body>
</html>
